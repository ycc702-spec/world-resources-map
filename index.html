<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 全球天然資源地圖 | World Natural Resources Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .resource-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .resource-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .country-path {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .country-path:hover {
            filter: brightness(1.2);
        }
        .pulse-ring {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .oil-gradient { background: linear-gradient(135deg, #dc2626, #991b1b); }
        .gas-gradient { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .coal-gradient { background: linear-gradient(135deg, #374151, #1f2937); }
        .mineral-gradient { background: linear-gradient(135deg, #7c3aed, #5b21b6); }
        .rare-gradient { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .gold-gradient { background: linear-gradient(135deg, #eab308, #ca8a04); }
        .diamond-gradient { background: linear-gradient(135deg, #ec4899, #db2777); }
        .lumber-gradient { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .lithium-gradient { background: linear-gradient(135deg, #14b8a6, #0d9488); }
        .silver-gradient { background: linear-gradient(135deg, #94a3b8, #64748b); }
        .nickel-gradient { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .phosphate-gradient { background: linear-gradient(135deg, #f97316, #ea580c); }
        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px;
            pointer-events: none;
            z-index: 1000;
            max-width: 300px;
        }
    </style>
</head>
<body class="text-white">

        // Initialize Map
        function initMap() {
            const width = document.getElementById('map-container').clientWidth;
            const height = 500;
            
            const svg = d3.select('#world-map')
                .attr('viewBox', `0 0 ${width} ${height}`);
            
            const projection = d3.geoNaturalEarth1()
                .scale(width / 5.5)
                .translate([width / 2, height / 2]);
            
            const path = d3.geoPath().projection(projection);
            
            // Load world data
            d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
                .then(world => {
                    const countries = topojson.feature(world, world.objects.countries);
                    
                    // Draw countries
                    svg.selectAll('path')
                        .data(countries.features)
                        .enter()
                        .append('path')
                        .attr('class', 'country-path')
                        .attr('d', path)
                        .attr('fill', d => getCountryColor(d.properties.name))
                        .attr('stroke', '#1e293b')
                        .attr('stroke-width', 0.5)
                        .on('click', (event, d) => showCountryDetails(d.properties.name))
                        .on('mouseover', function(event, d) {
                            d3.select(this).attr('opacity', 0.8);
                            showTooltip(event, d.properties.name);
                        })
                        .on('mouseout', function() {
                            d3.select(this).attr('opacity', 1);
                            hideTooltip();
                        });
                    
                    // Add resource markers
                    addResourceMarkers(svg, projection);
                })
                .catch(error => {
                    console.error('Error loading map data:', error);
                    document.getElementById('map-container').innerHTML = `
                        <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #94a3b8; text-align: center; padding: 20px;">
                            <div>
                                <div style="font-size: 3rem; margin-bottom: 1rem;">🗺️</div>
                                <div style="font-size: 1.2rem; margin-bottom: 0.5rem;">地圖載入中...</div>
                                <div style="font-size: 0.9rem; opacity: 0.7;">如果持續無法顯示，請檢查網路連線或重新整理頁面</div>
                            </div>
                        </div>
                    `;
                });
        }

        function getCountryColor(countryName) {
            const data = resourceData[countryName];
            if (!data) return '#334155';
            return data.color || '#334155';
        }

        function addResourceMarkers(svg, projection) {
            const markers = [
                { name: 'Saudi Arabia', coords: [45, 25], type: 'oil' },
                { name: 'Iran', coords: [53, 32], type: 'oil' },
                { name: 'Russia', coords: [95, 60], type: 'gas' },
                { name: 'China', coords: [105, 35], type: 'rare' },
                { name: 'Australia', coords: [135, -25], type: 'mineral' },
                { name: 'United States', coords: [-100, 40], type: 'oil' },
                { name: 'Canada', coords: [-110, 60], type: 'oil' },
                { name: 'Brazil', coords: [-55, -10], type: 'lumber' },
                { name: 'South Africa', coords: [25, -30], type: 'gold' },
                { name: 'Chile', coords: [-70, -30], type: 'mineral' }
            ];
            
            markers.forEach(marker => {
                const [x, y] = projection(marker.coords);
                if (x && y) {
                    svg.append('circle')
                        .attr('cx', x)
                        .attr('cy', y)
                        .attr('r', 6)
                        .attr('fill', getResourceColor(marker.type))
                        .attr('stroke', '#fff')
                        .attr('stroke-width', 2)
                        .attr('class', 'pulse-ring')
                        .style('cursor', 'pointer')
                        .on('click', () => showCountryDetails(marker.name));
                }
            });
        }

        function getResourceColor(type) {
            const colors = {
                oil: '#dc2626',
                gas: '#f59e0b',
                coal: '#374151',
                mineral: '#7c3aed',
                rare: '#06b6d4',
                gold: '#eab308',
                silver: '#94a3b8',
                diamond: '#ec4899',
                lumber: '#22c55e',
                lithium: '#14b8a6',
                nickel: '#6366f1',
                phosphate: '#f97316'
            };
            return colors[type] || '#94a3b8';
        }

        function showTooltip(event, countryName) {
            const tooltip = document.getElementById('tooltip');
            const data = resourceData[countryName];
            
            if (data) {
                tooltip.innerHTML = `
                    <strong>${data.name}</strong><br>
                    <span class="text-sm text-slate-300">${data.description}</span>
                `;
                tooltip.classList.remove('hidden');
                tooltip.style.left = event.pageX + 10 + 'px';
                tooltip.style.top = event.pageY + 10 + 'px';
            }
        }

            document.getElementById('tooltip').classList.add('hidden');

        function filterResource(type) {
            // Filter map by resource type
            d3.selectAll('.country-path')
                .attr('opacity', d => {
                    const data = resourceData[d.properties.name];
                    if (!data) return 0.2;
                    return data.resources.includes(type) ? 1 : 0.2;
                });
        }

        function showAllResources() {
            d3.selectAll('.country-path').attr('opacity', 1);
        }
